name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma Client
        run: npm --workspace apps/api run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm --workspaces run test

      - name: Build
        run: npm run build
