services:
  - type: web
    name: bolao-copa-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm --workspace apps/api run db:generate && npm --workspace apps/api run build && npm --workspace apps/api run db:deploy
    startCommand: npm --workspace apps/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: WORLD_CUP_API_URL
        value: https://worldcup26.ir/get/games
      - key: LIVE_SCORE_ENABLE_SCHEDULE_FALLBACK
        value: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
